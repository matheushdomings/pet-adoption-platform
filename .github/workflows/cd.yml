name: CD - Docker Build and Push

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Verify Docker username
        run: |
          echo "Docker user configurado:"
          echo "${{ secrets.DOCKER_USERNAME }}"

      - name: Build backend image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/pet-adoption-backend:latest \
            ./backend

      - name: Build frontend image
        run: |
          docker build \
            --build-arg VITE_API_URL=http://localhost:3000 \
            -t ${{ secrets.DOCKER_USERNAME }}/pet-adoption-frontend:latest \
            ./frontend

      - name: Push backend image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/pet-adoption-backend:latest

      - name: Push frontend image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/pet-adoption-frontend:latest